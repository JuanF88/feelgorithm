<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Feelgorithm — prototipo</title>
  <meta name="theme-color" content="#12101a" />
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    html, body { margin: 0; height: 100%; background: #12101a; overflow: hidden; }
    /* `position: fixed` + inset en vez de 100vw/100vh: en móvil, 100vh incluye la
       franja que ocupan las barras del navegador, así que el canvas quedaba más alto
       que el área visible y se cortaba por abajo — sobre todo al girar el teléfono. */
    #game {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;   /* alto real del viewport en navegadores modernos */
    }
    /* Phaser (Scale.FIT) centra y ajusta el canvas dentro de #game */

    /* El canvas es 16:9 fijo; si la ventana no lo es, Scale.FIT deja franjas a los
       lados o arriba/abajo. En vez de negro, se rellenan con el mismo fondo
       desenfocado y oscurecido: la franja deja de leerse como un error. */
    body::before {
      content: '';
      position: fixed;
      inset: -5vmax;                 /* margen extra para que el blur no muestre el borde */
      background: url('assets/bg/gameBackground.png') center / cover no-repeat;
      filter: blur(32px) brightness(0.42) saturate(0.75);
      z-index: -1;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <script src="vendor/phaser.min.js"></script>
  <script type="module" src="src/main.js"></script>
  <script>
    // PWA: registro del service worker (offline). Requiere servir por http(s), no file://
    // En desarrollo (localhost) el service worker estorba: intercepta cada archivo
    // y obliga a recargar en duro tras cada cambio. Ahí se DESREGISTRA y se limpian
    // sus cachés; solo se instala en el sitio publicado, que es donde importa que
    // el juego funcione sin conexión.
    const isDev = ['localhost', '127.0.0.1', ''].includes(location.hostname);

    if ('serviceWorker' in navigator) {
      if (isDev) {
        navigator.serviceWorker.getRegistrations()
          .then((rs) => rs.forEach((r) => r.unregister()))
          .catch(() => {});
        if (window.caches) caches.keys().then((ks) => ks.forEach((k) => caches.delete(k)));
      } else {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('service-worker.js').catch((e) => console.warn('SW:', e));
        });
      }
    }
  </script>
</body>
</html>
